packages:
  ubuntu:
    pkgs:
      - name: ack
      - name: bat
      - name: build-essential
      - name: diff-so-fancy
      - name: entr
      - name: gnupg2
      - name: gpg-agent
      - name: golang-go
      - name: htop
      - name: jq
      - name: libncurses5-dev
      - name: libncursesw5-dev
      - name: lsd
      - name: moreutils
      - name: nano
      - name: ngrok
      - name: neovim
      - name: ntp
      - name: openssh
      - name: openssl
