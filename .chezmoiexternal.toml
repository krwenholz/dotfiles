[".config/tmux/plugins/tpm"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tpm.git"
    refreshPeriod = "168h"  # Weekly update
[".config/tmux/plugins/tmux-sensible"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-sensible.git"
    refreshPeriod = "168h"  # Weekly update
[".config/tmux/plugins/tmux-resurrect"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-resurrect.git"
    refreshPeriod = "168h"  # Weekly update
[".config/tmux/plugins/tmux-continuum"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-continuum.git"
    refreshPeriod = "168h"  # Weekly update
[".config/tmux/plugins/tmux-yank"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tmux-yank.git"
    refreshPeriod = "168h"  # Weekly update
[".config/tmux/plugins/tmux-powerline"]
    type = "git-repo"
    url = "https://github.com/erikw/tmux-powerline.git"
    refreshPeriod = "168h"  # Weekly update
[".local/bin/fzf"]
    type = "archive-file"
    url = "https://github.com/junegunn/fzf/releases/download/v0.65.2/fzf-0.65.2-{{ .chezmoi.os }}_{{ .chezmoi.arch }}.tar.gz"
    path = "fzf"
{{ $ghVersion := "2.92.0" -}}
[".local/bin/gh"]
    type = "archive-file"
    url = "https://github.com/cli/cli/releases/download/v{{ $ghVersion }}/gh_{{ $ghVersion }}_{{ .chezmoi.os }}_{{ .chezmoi.arch }}.tar.gz"
    path = "gh_{{ $ghVersion }}_{{ .chezmoi.os }}_{{ .chezmoi.arch }}/bin/gh"
